<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EosMesh 客户端</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@emotion/react@11.11.1/dist/emotion-react.umd.min.js"></script>
    <script src="https://unpkg.com/@emotion/styled@11.11.0/dist/emotion-styled.umd.min.js"></script>
    <script src="https://unpkg.com/@mui/material@5.15.0/umd/material-ui.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        .message-bubble {
            max-width: 70%;
            word-wrap: break-word;
            border-radius: 18px;
            padding: 8px 12px;
            margin: 4px 0;
        }
        .message-mine {
            background-color: #1976d2;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message-other {
            background-color: #e0e0e0;
            color: #000;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message-time {
            font-size: 0.7rem;
            margin-top: 2px;
            color: #888;
        }
        .chat-messages {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex: 1;
            padding: 16px;
            position: relative;
        }
        body { margin: 0; background-color: #f5f5f5; }
        .search-result {
            display: flex;
            align-items: center;
            padding: 8px;
            margin-top: 8px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .search-result:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const MaterialUI = window.MaterialUI;
    const {
        ThemeProvider, createTheme, CssBaseline,
        Container, Box, Paper, AppBar, Toolbar, Typography, Button,
        TextField, Avatar, IconButton, List, ListItem,
        ListItemAvatar, ListItemText, Dialog, DialogTitle,
        DialogContent, DialogActions, Alert, Snackbar, CircularProgress,
        Icon, LinearProgress, Drawer, ListItemIcon, Switch, FormControlLabel
    } = MaterialUI;

    // 存储站点链接
    function getApiBase() {
        return localStorage.getItem('eos_api_base') || '';
    }
    function setApiBase(url) {
        localStorage.setItem('eos_api_base', url);
    }

    // 存储暗色模式偏好
    function getDarkModePreference() {
        const saved = localStorage.getItem('eos_dark_mode');
        if (saved !== null) return saved === 'true';
        return false; // 默认亮色
    }
    function setDarkModePreference(isDark) {
        localStorage.setItem('eos_dark_mode', isDark);
    }

    // 统一请求函数
    async function apiRequest(action, options = {}) {
        const apiBase = getApiBase();
        if (!apiBase) throw new Error('未设置站点链接，请先设置');
        const { method = 'POST', body = null, token = null, query = {} } = options;

        let url = apiBase;
        if (url.includes('?')) {
            url += '&';
        } else {
            url += '?';
        }
        url += `action=${encodeURIComponent(action)}`;
        for (const [key, val] of Object.entries(query)) {
            if (val !== undefined && val !== null) {
                url += `&${encodeURIComponent(key)}=${encodeURIComponent(val)}`;
            }
        }

        const headers = {};
        if (token) headers['Authorization'] = token;
        const isFormData = body instanceof FormData;
        if (!isFormData && body && method !== 'GET') {
            headers['Content-Type'] = 'application/json';
        }

        const fetchOptions = { method, headers };
        if (body) {
            fetchOptions.body = isFormData ? body : JSON.stringify(body);
        }

        const response = await fetch(url, fetchOptions);
        const data = await response.json();
        if (!response.ok || (data.code !== 200 && data.code !== 201)) {
            throw new Error(data.msg || '请求失败');
        }
        return data;
    }

    // 存储认证信息
    function saveAuth(uid, token) {
        localStorage.setItem('eos_uid', uid);
        localStorage.setItem('eos_token', token);
    }
    function getAuth() {
        return {
            uid: localStorage.getItem('eos_uid'),
            token: localStorage.getItem('eos_token')
        };
    }
    function clearAuth() {
        localStorage.removeItem('eos_uid');
        localStorage.removeItem('eos_token');
    }

    function formatTime(timestamp) {
        const date = new Date(timestamp * 1000);
        return `${date.getMonth() + 1}/${date.getDate()} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
    }

    // 获取头像URL辅助函数
    function getAvatarUrl(uid, version = null) {
        const base = getApiBase();
        if (!base) return '';
        let url = `${base}?action=get_avatar&uid=${encodeURIComponent(uid)}`;
        if (version) {
            url += `&v=${version}`;
        }
        return url;
    }

    // About 页面组件
    function AboutPage() {
        const [showGithub, setShowGithub] = React.useState(false);

        const handleSvgClick = () => {
            setShowGithub(true);
        };

        const handleGithubClick = () => {
            window.open('https://github.com/NTdebug145/EosMesh', '_blank');
        };

        return (
            <Box sx={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', bgcolor: 'background.default' }}>
                {/* 圆形 SVG（初始显示，点击后渐隐） */}
                <Box
                    sx={{
                        position: 'absolute',
                        transition: 'opacity 0.5s ease-in-out',
                        opacity: showGithub ? 0 : 1,
                        pointerEvents: showGithub ? 'none' : 'auto',
                        cursor: 'pointer',
                    }}
                    onClick={handleSvgClick}
                >
                    <svg width="120" height="120" viewBox="0 0 120 120">
                        <circle cx="60" cy="60" r="50" fill="#1976d2" stroke="#0a4b8a" strokeWidth="2" />
                    </svg>
                </Box>

                {/* GitHub 图标 + 版本号（点击圆形后渐显） */}
                <Box
                    sx={{
                        display: 'flex',
                        flexDirection: 'column',
                        alignItems: 'center',
                        transition: 'opacity 0.5s ease-in-out',
                        opacity: showGithub ? 1 : 0,
                        pointerEvents: showGithub ? 'auto' : 'none',
                    }}
                >
                    <IconButton onClick={handleGithubClick} sx={{ p: 0, mb: 1 }}>
                        <svg width="80" height="80" viewBox="0 0 24 24" fill="currentColor" style={{ color: 'inherit' }}>
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.108-.775.418-1.305.762-1.604-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                    </IconButton>
                    <Typography variant="body1" color="text.secondary">
                        b26.4.1 - HTML
                    </Typography>
                </Box>
            </Box>
        );
    }

    // 主应用
    function App() {
        const [isLoggedIn, setIsLoggedIn] = React.useState(false);
        const [loading, setLoading] = React.useState(true);
        const [darkMode, setDarkMode] = React.useState(getDarkModePreference());

        // 动态创建主题
        const theme = React.useMemo(() => {
            return createTheme({
                palette: {
                    mode: darkMode ? 'dark' : 'light',
                    primary: { main: '#1976d2' },
                    secondary: { main: '#dc004e' },
                },
            });
        }, [darkMode]);

        // 保存暗色模式偏好
        React.useEffect(() => {
            setDarkModePreference(darkMode);
        }, [darkMode]);

        React.useEffect(() => {
            const apiBase = getApiBase();
            const { uid, token } = getAuth();
            if (apiBase && uid && token) {
                apiRequest('get_friends', { token, method: 'GET' })
                    .then(() => setIsLoggedIn(true))
                    .catch(() => {
                        clearAuth();
                        setIsLoggedIn(false);
                    })
                    .finally(() => setLoading(false));
            } else {
                setLoading(false);
            }
        }, []);

        if (loading) {
            return <Box sx={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100vh' }}><CircularProgress /></Box>;
        }

        return (
            <ThemeProvider theme={theme}>
                <CssBaseline />
                {isLoggedIn ? <MainApp onLogout={() => setIsLoggedIn(false)} darkMode={darkMode} setDarkMode={setDarkMode} /> : <AuthView onLogin={() => setIsLoggedIn(true)} />}
            </ThemeProvider>
        );
    }

    // 登录/注册视图
    function AuthView({ onLogin }) {
        const [isLogin, setIsLogin] = React.useState(true);
        const [username, setUsername] = React.useState('');
        const [password, setPassword] = React.useState('');
        const [apiBase, setApiBaseLocal] = React.useState(getApiBase());
        const [error, setError] = React.useState('');
        const [loading, setLoading] = React.useState(false);

        const handleSubmit = async (e) => {
            e.preventDefault();
            setError('');
            if (!apiBase.trim()) {
                setError('请填写站点链接');
                return;
            }
            if (!username.trim() || !password.trim()) {
                setError('请填写用户名和密码');
                return;
            }
            setLoading(true);
            try {
                setApiBase(apiBase.trim());
                const action = isLogin ? 'login' : 'register';
                const data = await apiRequest(action, { body: { username: username.trim(), password } });
                saveAuth(data.data.uid, data.data.token);
                onLogin();
            } catch (err) {
                setError(err.message);
            } finally {
                setLoading(false);
            }
        };

        return (
            <Container maxWidth="sm" sx={{ mt: 8 }}>
                <Paper elevation={3} sx={{ p: 4, borderRadius: 2 }}>
                    <Typography variant="h5" align="center" gutterBottom>
                        {isLogin ? '登录 EosMesh' : '注册新账号'}
                    </Typography>
                    <Box component="form" onSubmit={handleSubmit} sx={{ mt: 2 }}>
                        <TextField
                            fullWidth
                            label="站点链接 (API 地址)"
                            variant="outlined"
                            margin="normal"
                            placeholder="例如: http://example.com/index.php"
                            value={apiBase}
                            onChange={(e) => setApiBaseLocal(e.target.value)}
                            disabled={loading}
                            required
                        />
                        <TextField
                            fullWidth
                            label="用户名"
                            variant="outlined"
                            margin="normal"
                            value={username}
                            onChange={(e) => setUsername(e.target.value)}
                            disabled={loading}
                            autoFocus
                        />
                        <TextField
                            fullWidth
                            label="密码"
                            type="password"
                            variant="outlined"
                            margin="normal"
                            value={password}
                            onChange={(e) => setPassword(e.target.value)}
                            disabled={loading}
                        />
                        {error && <Alert severity="error" sx={{ mt: 2 }}>{error}</Alert>}
                        <Button
                            type="submit"
                            fullWidth
                            variant="contained"
                            sx={{ mt: 3, mb: 2 }}
                            disabled={loading}
                        >
                            {loading ? <CircularProgress size={24} /> : (isLogin ? '登录' : '注册')}
                        </Button>
                        <Button
                            fullWidth
                            variant="text"
                            onClick={() => { setIsLogin(!isLogin); setError(''); }}
                            disabled={loading}
                        >
                            {isLogin ? '没有账号？立即注册' : '已有账号？立即登录'}
                        </Button>
                    </Box>
                </Paper>
            </Container>
        );
    }

    // 主界面
    function MainApp({ onLogout, darkMode, setDarkMode }) {
        const { uid, token } = getAuth();
        const [friends, setFriends] = React.useState([]);
        const [selectedFriend, setSelectedFriend] = React.useState(null);
        const [messages, setMessages] = React.useState([]);
        const [inputMsg, setInputMsg] = React.useState('');
        const [loadingFriends, setLoadingFriends] = React.useState(false);
        const [loadingMessages, setLoadingMessages] = React.useState(false);
        const [sending, setSending] = React.useState(false);
        const [snackbar, setSnackbar] = React.useState({ open: false, message: '', severity: 'info' });
        const [addFriendOpen, setAddFriendOpen] = React.useState(false);
        const [newFriendName, setNewFriendName] = React.useState('');
        const [addingFriend, setAddingFriend] = React.useState(false);
        const [avatarUploadOpen, setAvatarUploadOpen] = React.useState(false);
        const [avatarFile, setAvatarFile] = React.useState(null);
        const [uploadingAvatar, setUploadingAvatar] = React.useState(false);
        const [userInfo, setUserInfo] = React.useState({ username: '', avatar: null });
        const [settingsOpen, setSettingsOpen] = React.useState(false);
        const [tempApiBase, setTempApiBase] = React.useState(getApiBase());
        const [searchResult, setSearchResult] = React.useState(null);
        const [searching, setSearching] = React.useState(false);
        const [confirmAddOpen, setConfirmAddOpen] = React.useState(false);
        const [pendingFriend, setPendingFriend] = React.useState(null);
        // 头像版本号，用于上传后立即刷新当前用户头像
        const [avatarVersion, setAvatarVersion] = React.useState(Date.now());
        // 汉堡菜单状态
        const [drawerOpen, setDrawerOpen] = React.useState(false);
        // 关于页面状态
        const [showAbout, setShowAbout] = React.useState(false);
        const toggleDrawer = () => setDrawerOpen(!drawerOpen);

        // 用于保存上次消息内容，避免无谓更新
        const messagesRef = React.useRef([]);
        const chatContainerRef = React.useRef(null);
        const [shouldAutoScroll, setShouldAutoScroll] = React.useState(true);

        // 当前用户的头像URL (带版本号，上传后立即刷新)
        const myAvatarUrl = React.useMemo(() => {
            return getAvatarUrl(uid, avatarVersion);
        }, [uid, avatarVersion]);

        // 检测用户是否手动向上滚动
        const handleScroll = React.useCallback(() => {
            const container = chatContainerRef.current;
            if (!container) return;
            const { scrollTop, scrollHeight, clientHeight } = container;
            const isAtBottom = scrollHeight - scrollTop - clientHeight < 50;
            setShouldAutoScroll(isAtBottom);
        }, []);

        // 自动滚动到底部（当 shouldAutoScroll 为 true 时）
        React.useEffect(() => {
            if (shouldAutoScroll && chatContainerRef.current) {
                chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
            }
        }, [messages, shouldAutoScroll]);

        // 防抖搜索
        React.useEffect(() => {
            const timer = setTimeout(() => {
                if (newFriendName.trim() && /^[A-Z0-9]{32}$/.test(newFriendName.trim())) {
                    setSearching(true);
                    apiRequest('get_user_info', { method: 'POST', body: { uid: newFriendName.trim() } })
                        .then(res => {
                            setSearchResult(res.data);
                        })
                        .catch(() => {
                            setSearchResult(null);
                        })
                        .finally(() => setSearching(false));
                } else {
                    setSearchResult(null);
                }
            }, 500);
            return () => clearTimeout(timer);
        }, [newFriendName]);

        const handleConfirmAdd = () => {
            if (!pendingFriend) return;
            setAddingFriend(true);
            apiRequest('add_friend', { token, body: { username: pendingFriend.uid } })
                .then(() => {
                    setSnackbar({ open: true, message: '好友添加成功', severity: 'success' });
                    setAddFriendOpen(false);
                    setNewFriendName('');
                    setSearchResult(null);
                    setTimeout(fetchFriends, 500);
                })
                .catch(err => {
                    setSnackbar({ open: true, message: `添加失败: ${err.message}`, severity: 'error' });
                })
                .finally(() => {
                    setAddingFriend(false);
                    setConfirmAddOpen(false);
                    setPendingFriend(null);
                });
        };

        // 获取用户信息
        const fetchUserInfo = React.useCallback(async () => {
            try {
                const data = await apiRequest('get_user_info', { method: 'POST', body: { uid } });
                setUserInfo({ username: data.data.username, avatar: data.data.avatar });
            } catch (err) {
                console.error('获取用户信息失败', err);
            }
        }, [uid]);

        // 获取好友列表
        const fetchFriends = React.useCallback(async () => {
            setLoadingFriends(true);
            try {
                const data = await apiRequest('get_friends', { token, method: 'GET' });
                setFriends(data.data || []);
            } catch (err) {
                setSnackbar({ open: true, message: `加载好友失败: ${err.message}`, severity: 'error' });
            } finally {
                setLoadingFriends(false);
            }
        }, [token]);

        // 获取聊天记录（带内容比较，避免无谓刷新）
        const fetchMessages = React.useCallback(async (friendUid) => {
            if (!friendUid) return;
            setLoadingMessages(true);
            try {
                const data = await apiRequest('get_messages', {
                    token,
                    method: 'GET',
                    query: { friend_uid: friendUid }
                });
                const newMessages = data.data || [];
                // 深度比较，只有内容不同时才更新状态
                if (JSON.stringify(messagesRef.current) !== JSON.stringify(newMessages)) {
                    setMessages(newMessages);
                    messagesRef.current = newMessages;
                }
            } catch (err) {
                setSnackbar({ open: true, message: `加载消息失败: ${err.message}`, severity: 'error' });
            } finally {
                setLoadingMessages(false);
            }
        }, [token]);

        // 发送消息
        const sendMessage = async () => {
            if (!selectedFriend || !inputMsg.trim()) return;
            setSending(true);
            try {
                await apiRequest('send_message', {
                    token,
                    body: { to_uid: selectedFriend.uid, content: inputMsg.trim() }
                });
                setInputMsg('');
                await fetchMessages(selectedFriend.uid);
            } catch (err) {
                setSnackbar({ open: true, message: `发送失败: ${err.message}`, severity: 'error' });
            } finally {
                setSending(false);
            }
        };

        // 上传头像
        const handleAvatarUpload = async () => {
            if (!avatarFile) return;
            const formData = new FormData();
            formData.append('avatar', avatarFile);
            setUploadingAvatar(true);
            try {
                await apiRequest('upload_avatar', { token, method: 'POST', body: formData, isFormData: true });
                setSnackbar({ open: true, message: '头像上传成功', severity: 'success' });
                setAvatarUploadOpen(false);
                setAvatarFile(null);
                fetchUserInfo();
                // 更新头像版本号，强制刷新当前用户头像
                setAvatarVersion(Date.now());
            } catch (err) {
                setSnackbar({ open: true, message: `上传失败: ${err.message}`, severity: 'error' });
            } finally {
                setUploadingAvatar(false);
            }
        };

        // 修改站点链接
        const handleUpdateApiBase = () => {
            if (!tempApiBase.trim()) {
                setSnackbar({ open: true, message: '站点链接不能为空', severity: 'error' });
                return;
            }
            setApiBase(tempApiBase.trim());
            clearAuth();
            setSettingsOpen(false);
            onLogout();
            setSnackbar({ open: true, message: '站点链接已更改，请重新登录', severity: 'info' });
        };

        const handleLogout = () => {
            clearAuth();
            onLogout();
        };

        React.useEffect(() => {
            fetchUserInfo();
            fetchFriends();
        }, [fetchUserInfo, fetchFriends]);

        React.useEffect(() => {
            if (selectedFriend) {
                fetchMessages(selectedFriend.uid);
            }
        }, [selectedFriend, fetchMessages]);

        // 轮询（每5秒）
        React.useEffect(() => {
            const interval = setInterval(() => {
                if (selectedFriend) fetchMessages(selectedFriend.uid);
                fetchFriends();
            }, 5000);
            return () => clearInterval(interval);
        }, [selectedFriend, fetchMessages, fetchFriends]);

        return (
            <Box sx={{ display: 'flex', height: '100vh', flexDirection: 'column' }}>
                <AppBar position="static">
                    <Toolbar>
                        <IconButton color="inherit" onClick={showAbout ? () => setShowAbout(false) : toggleDrawer} edge="start">
                            <Icon>{showAbout ? 'arrow_back' : 'menu'}</Icon>
                        </IconButton>
                        <Typography variant="h6" sx={{ flexGrow: 1, ml: 2 }}>
                            {showAbout ? '关于' : 'EosMesh'}
                        </Typography>
                        {!showAbout && (
                            <Box>
                                <IconButton color="inherit" onClick={() => setAddFriendOpen(true)}><Icon>add</Icon></IconButton>
                                <IconButton color="inherit" onClick={() => { setTempApiBase(getApiBase()); setSettingsOpen(true); }}><Icon>settings</Icon></IconButton>
                            </Box>
                        )}
                    </Toolbar>
                </AppBar>

                {/* 侧边抽屉菜单（汉堡菜单） - 顶部显示圆形头像，下方选项栏包含关于和上传头像 */}
                <Drawer anchor="left" open={drawerOpen} onClose={toggleDrawer}>
                    <Box sx={{ width: 280, p: 2, display: 'flex', flexDirection: 'column', height: '100%' }}>
                        {/* 用户头像区域 - 圆形头像 + 用户名 + 刷新按钮 */}
                        <Box sx={{ display: 'flex', alignItems: 'center', mb: 2, pb: 1, borderBottom: '1px solid', borderColor: 'divider' }}>
                            <Avatar 
                                src={myAvatarUrl} 
                                sx={{ width: 48, height: 48, mr: 2 }}
                                onError={(e) => { e.target.onerror = null; e.target.src = ''; }}
                            >
                                <Icon>account_circle</Icon>
                            </Avatar>
                            <Typography variant="subtitle1" sx={{ flexGrow: 1, fontWeight: 500, wordBreak: 'break-word' }}>
                                {userInfo.username || uid.slice(0, 8)}
                            </Typography>
                            <IconButton 
                                size="small" 
                                onClick={() => { 
                                    fetchFriends(); 
                                    setSnackbar({ open: true, message: '好友列表已刷新', severity: 'info' });
                                }}
                                disabled={loadingFriends}
                            >
                                <Icon>refresh</Icon>
                            </IconButton>
                        </Box>
                        {/* 选项栏：关于 + 上传头像 */}
                        <List component="nav" sx={{ flexGrow: 1 }}>
                            <ListItem 
                                button 
                                onClick={() => {
                                    setShowAbout(true);
                                    toggleDrawer();
                                }}
                            >
                                <ListItemIcon>
                                    <Icon>info</Icon>
                                </ListItemIcon>
                                <ListItemText primary="关于" />
                            </ListItem>
                            <ListItem 
                                button 
                                onClick={() => {
                                    setAvatarUploadOpen(true);
                                    toggleDrawer();
                                }}
                            >
                                <ListItemIcon>
                                    <Icon>photo_camera</Icon>
                                </ListItemIcon>
                                <ListItemText primary="上传头像" />
                            </ListItem>
                        </List>
                        <Typography variant="body2" color="text.secondary" align="center" sx={{ mt: 2 }}>
                            更多功能开发中...
                        </Typography>
                    </Box>
                </Drawer>

                <Box sx={{ display: 'flex', flex: 1, overflow: 'hidden' }}>
                    {showAbout ? (
                        <AboutPage />
                    ) : (
                        <>
                            {/* 左侧好友列表 */}
                            <Paper elevation={0} sx={{ width: 280, borderRight: '1px solid', borderColor: 'divider', overflowY: 'auto', bgcolor: 'background.paper' }}>
                                <List>
                                    {friends.map(friend => {
                                        const friendAvatarUrl = getAvatarUrl(friend.uid);
                                        return (
                                            <ListItem
                                                key={friend.uid}
                                                button
                                                selected={selectedFriend?.uid === friend.uid}
                                                onClick={() => setSelectedFriend(friend)}
                                                sx={{ borderRadius: 1, mx: 1, mb: 0.5 }}
                                            >
                                                <ListItemAvatar>
                                                    <Avatar 
                                                        src={friendAvatarUrl}
                                                        onError={(e) => { e.target.onerror = null; e.target.src = ''; }}
                                                    >
                                                        <Icon>person</Icon>
                                                    </Avatar>
                                                </ListItemAvatar>
                                                <ListItemText primary={friend.username} secondary={friend.uid.slice(0,8)+'...'} />
                                            </ListItem>
                                        );
                                    })}
                                    {friends.length === 0 && !loadingFriends && (
                                        <Typography variant="body2" sx={{ p: 2, textAlign: 'center', color: 'text.secondary' }}>
                                            暂无好友，点击 + 添加
                                        </Typography>
                                    )}
                                    {loadingFriends && <CircularProgress sx={{ display: 'block', mx: 'auto', my: 2 }} />}
                                </List>
                            </Paper>

                            {/* 右侧聊天区域 */}
                            <Box sx={{ flex: 1, display: 'flex', flexDirection: 'column', bgcolor: 'background.default', position: 'relative' }}>
                                {selectedFriend ? (
                                    <>
                                        <Box sx={{ p: 2, borderBottom: '1px solid', borderColor: 'divider', bgcolor: 'background.paper', display: 'flex', alignItems: 'center' }}>
                                            <Avatar 
                                                src={getAvatarUrl(selectedFriend.uid)} 
                                                sx={{ mr: 1.5, width: 36, height: 36 }}
                                                onError={(e) => { e.target.onerror = null; e.target.src = ''; }}
                                            >
                                                <Icon>person</Icon>
                                            </Avatar>
                                            <Typography variant="h6">{selectedFriend.username}</Typography>
                                        </Box>
                                        {loadingMessages && <LinearProgress sx={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 1 }} />}
                                        <Box
                                            className="chat-messages"
                                            ref={chatContainerRef}
                                            onScroll={handleScroll}
                                        >
                                            {messages.length === 0 ? (
                                                <Typography variant="body2" sx={{ textAlign: 'center', color: 'text.secondary', mt: 4 }}>
                                                    暂无消息，发送一条吧~
                                                </Typography>
                                            ) : (
                                                messages.map((msg, idx) => {
                                                    const key = `${msg.from}_${msg.time}_${msg.content}_${idx}`;
                                                    return (
                                                        <Box key={key} sx={{ display: 'flex', justifyContent: msg.from === uid ? 'flex-end' : 'flex-start', mb: 1 }}>
                                                            <div className={`message-bubble ${msg.from === uid ? 'message-mine' : 'message-other'}`}>
                                                                <Typography variant="body2">{msg.content}</Typography>
                                                                <Typography variant="caption" className="message-time" sx={{ display: 'block', textAlign: 'right', color: msg.from === uid ? '#ddd' : '#666' }}>
                                                                    {formatTime(msg.time)}
                                                                </Typography>
                                                            </div>
                                                        </Box>
                                                    );
                                                })
                                            )}
                                        </Box>
                                        <Box sx={{ p: 2, bgcolor: 'background.paper', borderTop: '1px solid', borderColor: 'divider', display: 'flex' }}>
                                            <TextField
                                                fullWidth variant="outlined" placeholder="输入消息..."
                                                value={inputMsg} onChange={(e) => setInputMsg(e.target.value)}
                                                onKeyPress={(e) => e.key === 'Enter' && sendMessage()} disabled={sending} size="small"
                                            />
                                            <IconButton color="primary" onClick={sendMessage} disabled={sending || !inputMsg.trim()}>
                                                <Icon>send</Icon>
                                            </IconButton>
                                        </Box>
                                    </>
                                ) : (
                                    <Box sx={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%' }}>
                                        <Typography variant="h6" color="text.secondary">选择一个好友开始聊天</Typography>
                                    </Box>
                                )}
                            </Box>
                        </>
                    )}
                </Box>

                {/* 添加好友对话框 */}
                <Dialog open={addFriendOpen} onClose={() => { setAddFriendOpen(false); setNewFriendName(''); setSearchResult(null); }}>
                    <DialogTitle>添加好友</DialogTitle>
                    <DialogContent>
                        <TextField
                            autoFocus
                            margin="dense"
                            label="对方UID或用户名"
                            helperText="请输入32位UID（大写字母数字组合）或用户名"
                            fullWidth
                            variant="outlined"
                            value={newFriendName}
                            onChange={(e) => setNewFriendName(e.target.value)}
                            disabled={addingFriend}
                        />
                        {searching && <CircularProgress size={24} sx={{ mt: 1 }} />}
                        {searchResult && !searching && (
                            <Box className="search-result" onClick={() => {
                                setPendingFriend({ uid: searchResult.uid, username: searchResult.username });
                                setConfirmAddOpen(true);
                            }}>
                                <Avatar src={getAvatarUrl(searchResult.uid)} sx={{ mr: 2 }} onError={(e) => { e.target.onerror = null; e.target.src = ''; }}>
                                    <Icon>person</Icon>
                                </Avatar>
                                <Box>
                                    <Typography variant="body1">{searchResult.username}</Typography>
                                    <Typography variant="caption" color="text.secondary">{searchResult.uid}</Typography>
                                </Box>
                            </Box>
                        )}
                    </DialogContent>
                    <DialogActions>
                        <Button onClick={() => { setAddFriendOpen(false); setNewFriendName(''); setSearchResult(null); }}>取消</Button>
                    </DialogActions>
                </Dialog>

                {/* 确认添加好友弹窗 */}
                <Dialog open={confirmAddOpen} onClose={() => setConfirmAddOpen(false)}>
                    <DialogTitle>添加好友</DialogTitle>
                    <DialogContent>
                        <Typography>确定要添加 <strong>{pendingFriend?.username}</strong> 为好友吗？</Typography>
                    </DialogContent>
                    <DialogActions>
                        <Button onClick={() => setConfirmAddOpen(false)}>取消</Button>
                        <Button onClick={handleConfirmAdd} color="primary" disabled={addingFriend}>
                            {addingFriend ? <CircularProgress size={24} /> : '确定'}
                        </Button>
                    </DialogActions>
                </Dialog>

                {/* 上传头像对话框 */}
                <Dialog open={avatarUploadOpen} onClose={() => setAvatarUploadOpen(false)}>
                    <DialogTitle>上传头像</DialogTitle>
                    <DialogContent>
                        <input type="file" accept="image/jpeg,image/png,image/gif"
                               onChange={(e) => setAvatarFile(e.target.files[0])} style={{ marginTop: 8 }} />
                    </DialogContent>
                    <DialogActions>
                        <Button onClick={() => setAvatarUploadOpen(false)}>取消</Button>
                        <Button onClick={handleAvatarUpload} disabled={!avatarFile || uploadingAvatar}>
                            {uploadingAvatar ? <CircularProgress size={24} /> : '上传'}
                        </Button>
                    </DialogActions>
                </Dialog>

                {/* 设置对话框 - 新增暗色模式开关 */}
                <Dialog open={settingsOpen} onClose={() => setSettingsOpen(false)}>
                    <DialogTitle>设置</DialogTitle>
                    <DialogContent>
                        <TextField
                            fullWidth
                            label="站点链接 (API 地址)"
                            variant="outlined"
                            margin="dense"
                            placeholder="例如: http://example.com/index.php"
                            value={tempApiBase}
                            onChange={(e) => setTempApiBase(e.target.value)}
                        />
                        <Typography variant="body2" color="text.secondary" sx={{ mt: 1, mb: 2 }}>
                            修改后将清除当前登录状态，需要重新登录。
                        </Typography>
                        
                        {/* 暗色模式开关 - 位于退出登录按钮上方 */}
                        <FormControlLabel
                            control={
                                <Switch
                                    checked={darkMode}
                                    onChange={(e) => setDarkMode(e.target.checked)}
                                    color="primary"
                                />
                            }
                            label="暗色模式"
                            sx={{ mb: 2 }}
                        />
                        
                        <Button
                            fullWidth
                            variant="outlined"
                            color="error"
                            onClick={handleLogout}
                            sx={{ mt: 1 }}
                        >
                            退出登录
                        </Button>
                    </DialogContent>
                    <DialogActions>
                        <Button onClick={() => setSettingsOpen(false)}>取消</Button>
                        <Button onClick={handleUpdateApiBase} color="primary">保存站点链接</Button>
                    </DialogActions>
                </Dialog>

                {/* 全局提示 */}
                <Snackbar open={snackbar.open} autoHideDuration={4000}
                          onClose={() => setSnackbar({ ...snackbar, open: false })}
                          anchorOrigin={{ vertical: 'bottom', horizontal: 'center' }}>
                    <Alert severity={snackbar.severity} onClose={() => setSnackbar({ ...snackbar, open: false })}>
                        {snackbar.message}
                    </Alert>
                </Snackbar>
            </Box>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
