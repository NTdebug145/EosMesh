<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EosMesh 客户端</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@emotion/react@11.11.1/dist/emotion-react.umd.min.js"></script>
    <script src="https://unpkg.com/@emotion/styled@11.11.0/dist/emotion-styled.umd.min.js"></script>
    <script src="https://unpkg.com/@mui/material@5.15.0/umd/material-ui.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
        .message-bubble { max-width: 70%; word-wrap: break-word; border-radius: 18px; padding: 8px 12px; margin: 4px 0; word-break: break-all; white-space: pre-wrap; }
        .message-mine { background-color: #1976d2; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message-other { background-color: #e0e0e0; color: #000; align-self: flex-start; border-bottom-left-radius: 4px; }
        .chat-messages { display: flex; flex-direction: column; overflow-y: auto; flex: 1; padding: 16px; position: relative; min-width: 0; max-width: 100%; box-sizing: border-box; }
        body { margin: 0; background-color: #f5f5f5; }
        .search-result { display: flex; align-items: center; padding: 8px; margin-top: 8px; border: 1px solid #e0e0e0; border-radius: 8px; cursor: pointer; }
        .search-result:hover { background-color: #f5f5f5; }
        .loading-more-indicator { text-align: center; padding: 8px; color: #888; font-size: 12px; }
        .file-card { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 8px; border-radius: 12px; background-color: rgba(0,0,0,0.05); transition: background 0.2s; }
        .file-card:hover { background-color: rgba(0,0,0,0.1); }
        .file-info { flex: 1; min-width: 0; }
        .file-name { font-weight: 500; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-size { font-size: 0.75rem; opacity: 0.7; }
        .file-download-icon { display: flex; align-items: center; justify-content: center; width: 24px; }
        .message-mine .file-card { background-color: rgba(255,255,255,0.15); }
        .message-mine .file-card:hover { background-color: rgba(255,255,255,0.25); }
        * { transform: translateZ(0); }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const MaterialUI = window.MaterialUI;
const {
    ThemeProvider, createTheme, CssBaseline, Container, Box, Paper, AppBar, Toolbar, Typography, Button,
    TextField, Avatar, IconButton, List, ListItem, ListItemAvatar, ListItemText, Dialog, DialogTitle,
    DialogContent, DialogActions, Alert, Snackbar, CircularProgress, Icon, LinearProgress, Drawer,
    ListItemIcon, Switch, FormControlLabel, Tabs, Tab, RadioGroup, FormControl, FormLabel, Radio,
    Divider, useTheme, Table, TableBody, TableCell, TableContainer, TableHead, TableRow, Tooltip
} = MaterialUI;

    // ==================== 全局刷新锁 & 事件 ====================
    let refreshPromise = null;
    let lastRefreshTime = 0;
    const REFRESH_INTERVAL = 240;
    const TOKEN_EXPIRE_THRESHOLD = 60;

    function getApiBase() { return localStorage.getItem('eos_api_base') || ''; }
    function setApiBase(url) { localStorage.setItem('eos_api_base', url); }
    function getDarkModePreference() { const saved = localStorage.getItem('eos_dark_mode'); return saved !== null ? saved === 'true' : false; }
    function setDarkModePreference(isDark) { localStorage.setItem('eos_dark_mode', isDark); }

    function parseTokenExpiry(token) {
        if (!token) return 0;
        const parts = token.split(':');
        if (parts.length !== 3) return 0;
        const expires = parseInt(parts[1], 10);
        return isNaN(expires) ? 0 : expires;
    }

    function isTokenExpiringSoon(token) {
        const expiry = parseTokenExpiry(token);
        if (expiry === 0) return false;
        const remaining = expiry - Math.floor(Date.now() / 1000);
        return remaining < TOKEN_EXPIRE_THRESHOLD;
    }

    async function apiRequest(action, options = {}) {
        const apiBase = getApiBase();
        if (!apiBase) throw new Error('未设置站点链接，请先设置');
        const { method = 'POST', body = null, token = null, query = {}, skipAuthRefresh = false } = options;
        
        let url = apiBase + (apiBase.includes('?') ? '&' : '?') + `action=${encodeURIComponent(action)}`;
        for (const [key, val] of Object.entries(query)) if (val !== undefined) url += `&${encodeURIComponent(key)}=${encodeURIComponent(val)}`;
        
        const headers = {};
        let authToken = token;
        if (!authToken) {
            const auth = getAuth();
            authToken = auth.token;
        }
        if (authToken) headers['Authorization'] = authToken;
        
        const isFormData = body instanceof FormData;
        if (!isFormData && body && method !== 'GET') headers['Content-Type'] = 'application/json';
        
        const fetchOptions = { method, headers };
        if (body) fetchOptions.body = isFormData ? body : JSON.stringify(body);
        
        const makeRequest = async () => {
            const response = await fetch(url, fetchOptions);
            const data = await response.json();
            if (!response.ok || (data.code !== 200 && data.code !== 201)) {
                const err = new Error(data.msg || '请求失败');
                err.code = data.code;
                err.status = response.status;
                throw err;
            }
            return data;
        };
        
        try {
            return await makeRequest();
        } catch (err) {
            if (err.status === 401 && !skipAuthRefresh && action !== 'refresh_token') {
                const refreshed = await attemptTokenRefresh();
                if (refreshed) {
                    const newAuth = getAuth();
                    if (newAuth.token) headers['Authorization'] = newAuth.token;
                    const retryOptions = { ...options, skipAuthRefresh: true };
                    return await apiRequest(action, retryOptions);
                } else {
                    clearAuth();
                    if (typeof window.__onAuthFailure === 'function') {
                        window.__onAuthFailure();
                    } else {
                        window.location.reload();
                    }
                    throw new Error('登录已过期，请重新登录');
                }
            }
            throw err;
        }
    }

    async function attemptTokenRefresh() {
        if (refreshPromise) {
            try {
                await refreshPromise;
                return true;
            } catch {
                return false;
            }
        }
        
        refreshPromise = (async () => {
            const apiBase = getApiBase();
            const { token } = getAuth();
            if (!apiBase || !token) return false;
            
            const now = Math.floor(Date.now() / 1000);
            if (now - lastRefreshTime < REFRESH_INTERVAL) {
                console.log('刷新频率过高，跳过本次刷新');
                return false;
            }
            
            try {
                let url = apiBase + (apiBase.includes('?') ? '&' : '?') + 'action=refresh_token';
                const resp = await fetch(url, {
                    method: 'POST',
                    headers: { 'Authorization': token, 'Content-Type': 'application/json' }
                });
                const data = await resp.json();
                if (resp.ok && data.code === 200 && data.data && data.data.token) {
                    const newToken = data.data.token;
                    const { uid } = getAuth();
                    if (uid) {
                        saveAuth(uid, newToken);
                        lastRefreshTime = now;
                        console.log('Token刷新成功');
                        window.dispatchEvent(new CustomEvent('eos-token-refreshed'));
                        return true;
                    }
                } else if (data.code === 429) {
                    lastRefreshTime = now;
                    console.warn('刷新被限频(429)', data.msg);
                    return false;
                } else {
                    console.error('刷新Token失败', data.msg);
                    return false;
                }
            } catch (err) {
                console.error('刷新Token网络错误', err);
                return false;
            } finally {
                refreshPromise = null;
            }
            return false;
        })();
        
        return await refreshPromise;
    }

    function saveAuth(uid, token) { localStorage.setItem('eos_uid', uid); localStorage.setItem('eos_token', token); }
    function getAuth() { return { uid: localStorage.getItem('eos_uid'), token: localStorage.getItem('eos_token') }; }
    function clearAuth() { localStorage.removeItem('eos_uid'); localStorage.removeItem('eos_token'); }
    function formatTime(timestamp) { const d = new Date(timestamp * 1000); return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; }
    function getAvatarUrl(uid, version = null) { 
        const base = getApiBase(); 
        if (!base) return ''; 
        let url = `${base}${base.includes('?') ? '&' : '?'}action=get_avatar&uid=${encodeURIComponent(uid)}`; 
        if (version) url += `&v=${version}`; 
        return url; 
    }

    // 文件大小格式化
    function formatFileSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    // 解析文件消息
function parseFileMessage(content) {
    // 兼容两种格式：[/pan{"stationID":"...","code":"..."}] 或 [/pan/{"stationID":"...","code":"..."}]
    const regex = /^\[\/pan\/?(\{"stationID":"[A-Z0-9]+","code":"[A-Z0-9]+"\})\]$/;
    const match = content.match(regex);
    if (match) {
        try {
            const obj = JSON.parse(match[1]);
            return { stationID: obj.stationID, fileId: obj.code };
        } catch(e) { return null; }
    }
    return null;
}

    // ==================== UploadView 上传组件 ====================
    function UploadView({ token, onUploadComplete, siteConfig }) {
        const theme = useTheme();
        const [file, setFile] = React.useState(null);
        const [dragActive, setDragActive] = React.useState(false);
        const [uploadProgress, setUploadProgress] = React.useState(0);
        const [uploading, setUploading] = React.useState(false);
        const [useChunk, setUseChunk] = React.useState(false);
        const [chunkSizeUnit, setChunkSizeUnit] = React.useState('MB');
        const [chunkSizeValue, setChunkSizeValue] = React.useState(2);
        const [allowDownload, setAllowDownload] = React.useState(true);
        const [snackbar, setSnackbar] = React.useState({ open: false, message: '', severity: 'info' });
        
        const maxSizeBytes = siteConfig?.upload_limit_bytes || 1073741824;
        const maxSizeGB = siteConfig?.upload_limit_gb || 1;
        
        const fileSizePercent = file ? Math.min(100, (file.size / maxSizeBytes) * 100) : 0;
        const isOverSize = file && file.size > maxSizeBytes;
        
        const showMessage = (msg, severity = 'info') => setSnackbar({ open: true, message: msg, severity });
        
        const handleDrag = (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (e.type === 'dragenter' || e.type === 'dragover') setDragActive(true);
            else if (e.type === 'dragleave') setDragActive(false);
        };
        
        const handleDrop = (e) => {
            e.preventDefault();
            e.stopPropagation();
            setDragActive(false);
            const droppedFile = e.dataTransfer.files[0];
            if (droppedFile) setFile(droppedFile);
        };
        
        const handleFileSelect = (e) => {
            if (e.target.files[0]) setFile(e.target.files[0]);
        };
        
        const clearFile = () => {
            setFile(null);
            setUploadProgress(0);
        };
        
        const uploadFileWithProgress = (fileObj) => {
            return new Promise((resolve, reject) => {
                const formData = new FormData();
                formData.append('file', fileObj);
                const apiBase = getApiBase();
                const auth = getAuth();
                const xhr = new XMLHttpRequest();
                xhr.open('POST', `${apiBase}${apiBase.includes('?') ? '&' : '?'}action=upload_file`);
                xhr.setRequestHeader('Authorization', auth.token);
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        setUploadProgress((e.loaded / e.total) * 100);
                    }
                };
                xhr.onload = () => {
                    if (xhr.status === 200) {
                        try {
                            const resp = JSON.parse(xhr.responseText);
                            if (resp.code === 200) resolve(resp.data);
                            else reject(new Error(resp.msg));
                        } catch (err) { reject(err); }
                    } else reject(new Error('上传失败'));
                };
                xhr.onerror = () => reject(new Error('网络错误'));
                xhr.send(formData);
            });
        };
        
        const uploadWithChunks = async (fileObj) => {
            let chunkSizeBytes = chunkSizeValue * (chunkSizeUnit === 'MB' ? 1024 * 1024 : 1024);
            const totalChunks = Math.ceil(fileObj.size / chunkSizeBytes);
            setUploadProgress(0);
            
            const initData = await apiRequest('multipart_init', {
                token, method: 'POST',
                body: {
                    original_name: fileObj.name,
                    total_chunks: totalChunks,
                    chunk_size: chunkSizeBytes
                }
            });
            const uploadId = initData.data.upload_id;
            
            for (let i = 0; i < totalChunks; i++) {
                const start = i * chunkSizeBytes;
                const end = Math.min(start + chunkSizeBytes, fileObj.size);
                const chunk = fileObj.slice(start, end);
                const chunkFormData = new FormData();
                chunkFormData.append('upload_id', uploadId);
                chunkFormData.append('part_number', i + 1);
                chunkFormData.append('chunk', chunk);
                
                await new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    const apiBase = getApiBase();
                    const auth = getAuth();
                    xhr.open('POST', `${apiBase}${apiBase.includes('?') ? '&' : '?'}action=multipart_upload`);
                    xhr.setRequestHeader('Authorization', auth.token);
                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable) {
                            const chunkProgress = (e.loaded / e.total) * (100 / totalChunks);
                            setUploadProgress(prev => Math.min(100, (i / totalChunks) * 100 + chunkProgress));
                        }
                    };
                    xhr.onload = () => {
                        if (xhr.status === 200) resolve();
                        else reject(new Error('分块上传失败'));
                    };
                    xhr.onerror = () => reject(new Error('网络错误'));
                    xhr.send(chunkFormData);
                });
            }
            
            const completeData = await apiRequest('multipart_complete', {
                token, method: 'POST',
                body: { upload_id: uploadId }
            });
            setUploadProgress(100);
            return completeData.data;
        };
        
        const handleUpload = async () => {
            if (!file || isOverSize) return;
            setUploading(true);
            setUploadProgress(0);
            try {
                let uploadResult;
                if (useChunk) uploadResult = await uploadWithChunks(file);
                else uploadResult = await uploadFileWithProgress(file);
                
                const fileId = uploadResult.file_id;
                
                if (!allowDownload && fileId) {
                    await apiRequest('set_file_downloadable', {
                        token, method: 'POST',
                        body: { file_id: fileId, allow_download: false }
                    });
                }
                
                showMessage('文件上传成功！', 'success');
                if (onUploadComplete) onUploadComplete(fileId);
                clearFile();
            } catch (err) {
                showMessage(`上传失败: ${err.message}`, 'error');
            } finally {
                setUploading(false);
                setUploadProgress(0);
            }
        };
        
        React.useEffect(() => {
            if (chunkSizeUnit === 'KB' && chunkSizeValue > 1024) setChunkSizeValue(1024);
            if (chunkSizeUnit === 'MB' && chunkSizeValue > 100) setChunkSizeValue(100);
        }, [chunkSizeUnit]);
        
        const hasFile = !!file && !isOverSize;
        
        return (
            <Box sx={{ flex: 1, display: 'flex', flexDirection: { xs: 'column', md: 'row' }, gap: 3, p: 3, overflow: 'auto', bgcolor: 'background.default' }}>
                <Box sx={{ flex: 1, minWidth: 0 }}>
                    <Paper
                        variant="outlined"
                        onDragEnter={handleDrag}
                        onDragLeave={handleDrag}
                        onDragOver={handleDrag}
                        onDrop={handleDrop}
                        onClick={() => document.getElementById('file-input').click()}
                        sx={{
                            position: 'relative',
                            height: 300,
                            display: 'flex',
                            flexDirection: 'column',
                            alignItems: 'center',
                            justifyContent: 'center',
                            cursor: 'pointer',
                            bgcolor: dragActive ? 'action.hover' : 'background.paper',
                            border: dragActive ? '2px dashed #1976d2' : `2px dashed ${theme.palette.divider}`,
                            borderRadius: 4,
                            overflow: 'hidden',
                            transition: 'all 0.2s',
                            '&:hover': { bgcolor: 'action.hover' }
                        }}
                    >
                        <input
                            id="file-input"
                            type="file"
                            style={{ display: 'none' }}
                            onChange={handleFileSelect}
                            disabled={uploading}
                        />
                        {file && !isOverSize && (
                            <Box sx={{
                                position: 'absolute',
                                bottom: 0,
                                left: 0,
                                width: `${fileSizePercent}%`,
                                height: '8px',
                                bgcolor: '#4caf50',
                                transition: 'width 0.3s'
                            }} />
                        )}
                        {file && isOverSize && (
                            <Box sx={{
                                position: 'absolute',
                                top: 0,
                                left: 0,
                                right: 0,
                                bottom: 0,
                                bgcolor: 'rgba(244, 67, 54, 0.2)',
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'center'
                            }}>
                                <Typography color="error">文件大小超过站点限制 ({maxSizeGB}GB)</Typography>
                            </Box>
                        )}
                        {!file && (
                            <>
                                <Icon sx={{ fontSize: 64, color: 'grey.400', mb: 2 }}>cloud_upload</Icon>
                                <Typography variant="body1" color="text.secondary">拖拽文件到此处，或点击选择</Typography>
                                <Typography variant="caption" color="text.secondary">支持任意格式，最大 {maxSizeGB}GB</Typography>
                            </>
                        )}
                        {file && !isOverSize && (
                            <Box sx={{ textAlign: 'center', p: 2, zIndex: 1 }}>
                                <Typography variant="body1" fontWeight={500}>{file.name}</Typography>
                                <Typography variant="caption" color="text.secondary">
                                    {(file.size / 1024 / 1024).toFixed(2)} MB / {maxSizeGB} GB
                                </Typography>
                            </Box>
                        )}
                    </Paper>
                </Box>
                
                <Box sx={{ width: { xs: '100%', md: 320 } }}>
                    <Paper variant="outlined" sx={{ p: 2 }}>
                        <Typography variant="subtitle1" fontWeight={500} gutterBottom>上传选项</Typography>
                        
                        <FormControlLabel
                            control={<Switch checked={useChunk} onChange={(e) => setUseChunk(e.target.checked)} disabled={uploading} />}
                            label="启用分块上传"
                            sx={{ mb: 1 }}
                        />
                        
                        {useChunk && (
                            <Box sx={{ display: 'flex', alignItems: 'center', gap: 1, mb: 2 }}>
                                <TextField
                                    type="number"
                                    size="small"
                                    value={chunkSizeValue}
                                    onChange={(e) => setChunkSizeValue(Math.max(1, parseInt(e.target.value) || 1))}
                                    disabled={uploading}
                                    sx={{ width: 100 }}
                                />
                                <RadioGroup row value={chunkSizeUnit} onChange={(e) => setChunkSizeUnit(e.target.value)}>
                                    <FormControlLabel value="KB" control={<Radio size="small" />} label="KB" />
                                    <FormControlLabel value="MB" control={<Radio size="small" />} label="MB" />
                                </RadioGroup>
                            </Box>
                        )}
                        
                        <FormControlLabel
                            control={<Switch checked={allowDownload} onChange={(e) => setAllowDownload(e.target.checked)} disabled={uploading} />}
                            label="是否允许其他人下载"
                            sx={{ mb: 2 }}
                        />
                        
                        <Divider sx={{ my: 2 }} />
                        
                        <Box sx={{ display: 'flex', gap: 2 }}>
                            <Box sx={{ flex: 1, position: 'relative' }}>
                                {uploading ? (
                                    <LinearProgress
                                        variant="determinate"
                                        value={uploadProgress}
                                        sx={{ height: 36, borderRadius: 1 }}
                                    />
                                ) : (
                                    <Button
                                        fullWidth
                                        variant="contained"
                                        onClick={handleUpload}
                                        disabled={!hasFile || uploading}
                                        startIcon={<Icon>upload</Icon>}
                                    >
                                        上传
                                    </Button>
                                )}
                            </Box>
                            <Button
                                variant="outlined"
                                onClick={clearFile}
                                disabled={!file || uploading}
                                startIcon={<Icon>clear</Icon>}
                            >
                                清空
                            </Button>
                        </Box>
                    </Paper>
                </Box>
                
                <Snackbar open={snackbar.open} autoHideDuration={4000} onClose={() => setSnackbar({ ...snackbar, open: false })}>
                    <Alert severity={snackbar.severity}>{snackbar.message}</Alert>
                </Snackbar>
            </Box>
        );
    }

    // ==================== AboutPage ====================
    function AboutPage() {
        const [showGithub, setShowGithub] = React.useState(false);
        const [serverInfo, setServerInfo] = React.useState({ version: null, type: null });
        React.useEffect(() => {
            Promise.allSettled([
                apiRequest('get_station_version', { method: 'GET', token: null, skipAuthRefresh: true }).catch(() => ({ error: true })),
                apiRequest('get_server_type', { method: 'GET', token: null, skipAuthRefresh: true }).catch(() => ({ error: true }))
            ]).then(([v, t]) => {
                const version = v.status === 'fulfilled' && !v.value.error ? v.value.data?.version : null;
                const type = t.status === 'fulfilled' && !t.value.error ? t.value.data?.type : null;
                setServerInfo({ version, type });
            });
        }, []);
        const clientVersion = 'b26.5.4 - HTML';
        const serverDisplay = serverInfo.version ? `${serverInfo.version} - ${serverInfo.type || 'unknown'}/Server` : '';
        return (
            <Box sx={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', position:'relative', bgcolor:'background.default' }}>
                <Box sx={{ position:'absolute', transition:'opacity 0.5s', opacity: showGithub?0:1, pointerEvents: showGithub?'none':'auto', cursor:'pointer' }} onClick={()=>setShowGithub(true)}>
                    <svg width="120" height="120" viewBox="0 0 120 120"><circle cx="60" cy="60" r="50" fill="#1976d2" stroke="#0a4b8a" strokeWidth="2" /></svg>
                </Box>
                <Box sx={{ display:'flex', flexDirection:'column', alignItems:'center', transition:'opacity 0.5s', opacity: showGithub?1:0, pointerEvents: showGithub?'auto':'none' }}>
                    <IconButton onClick={()=>window.open('https://github.com/NTdebug145/EosMesh','_blank')} sx={{ p:0, mb:1 }}>

    // ==================== AuthView ====================
    function AuthView({ onLogin }) {
        const [isLogin, setIsLogin] = React.useState(true);
        const [username, setUsername] = React.useState('');
        const [password, setPassword] = React.useState('');
        const [apiBase, setApiBaseLocal] = React.useState(getApiBase());
        const [error, setError] = React.useState('');
        const [loading, setLoading] = React.useState(false);
        const handleSubmit = async (e) => {
            e.preventDefault();
            setError('');
            if (!apiBase.trim()) { setError('请填写站点链接'); return; }
            if (!username.trim() || !password.trim()) { setError('请填写用户名和密码'); return; }
            setLoading(true);
            try {
                setApiBase(apiBase.trim());
                const action = isLogin ? 'login' : 'register';
                const data = await apiRequest(action, { body: { username: username.trim(), password }, skipAuthRefresh: true });
                saveAuth(data.data.uid, data.data.token);
                lastRefreshTime = 0;
                refreshPromise = null;
                onLogin();
            } catch (err) { setError(err.message); } finally { setLoading(false); }
        };
        return (
            <Container maxWidth="sm" sx={{ mt: 8 }}>
                <Paper elevation={3} sx={{ p: 4, borderRadius: 2 }}>
                    <Typography variant="h5" align="center">{isLogin ? '登录 EosMesh' : '注册新账号'}</Typography>
                    <Box component="form" onSubmit={handleSubmit} sx={{ mt: 2 }}>
                        <TextField fullWidth label="站点链接 (API 地址)" variant="outlined" margin="normal" placeholder="例如: http://example.com/index.php" value={apiBase} onChange={e=>setApiBaseLocal(e.target.value)} disabled={loading} required />
                        <TextField fullWidth label="用户名" variant="outlined" margin="normal" value={username} onChange={e=>setUsername(e.target.value)} disabled={loading} autoFocus />
                        <TextField fullWidth label="密码" type="password" variant="outlined" margin="normal" value={password} onChange={e=>setPassword(e.target.value)} disabled={loading} />
                        {error && <Alert severity="error" sx={{ mt: 2 }}>{error}</Alert>}
                        <Button type="submit" fullWidth variant="contained" sx={{ mt: 3, mb: 2 }} disabled={loading}>{loading ? <CircularProgress size={24} /> : (isLogin ? '登录' : '注册')}</Button>
                        <Button fullWidth variant="text" onClick={()=>{ setIsLogin(!isLogin); setError(''); }} disabled={loading}>{isLogin ? '没有账号？立即注册' : '已有账号？立即登录'}</Button>
                    </Box>
                </Paper>
            </Container>
        );
    }

    // ==================== MessagesPage ====================
    function MessagesPage({ fetchFriends, tabValue, setTabValue }) {
        const { token } = getAuth();
        const [verifyMode, setVerifyMode] = React.useState('need_verify');
        const [requests, setRequests] = React.useState([]);
        const [loadingRequests, setLoadingRequests] = React.useState(false);

        const [selectedRequest, setSelectedRequest] = React.useState(null);

        const [accepting, setAccepting] = React.useState(false);

        const showMessage = (msg, severity='info') => setSnackbarLocal({ open: true, message: msg, severity });

            setLoadingVerify(true);
            try { const data = await apiRequest('get_verify_setting', { token, method: 'GET' }); setVerifyMode(data.data.mode); } 
            catch (err) { showMessage('获取验证方式失败: '+err.message, 'error'); } finally { setLoadingVerify(false); }
        };
        const saveVerifySetting = async (mode) => {
            setLoadingVerify(true);
            try { await apiRequest('set_verify_setting', { token, method: 'POST', body: { mode } }); setVerifyMode(mode); showMessage('验证方式已更新', 'success'); } 
            catch (err) { showMessage('保存失败: '+err.message, 'error'); } finally { setLoadingVerify(false); }
        };
        const fetchRequests = async () => {
            setLoadingRequests(true);
            try { const data = await apiRequest('get_friend_requests', { token, method: 'GET' }); setRequests(data.data || []); } 
            catch (err) { showMessage('获取好友申请失败: '+err.message, 'error'); } finally { setLoadingRequests(false); }
        };
        const acceptRequest = async (requestId) => {
            setAccepting(true);
            try { await apiRequest('accept_friend_request', { token, method: 'POST', body: { request_id: requestId } }); showMessage('已添加为好友', 'success'); await fetchRequests(); fetchFriends(); } 
            catch (err) { showMessage('操作失败: '+err.message, 'error'); } finally { setAccepting(false); setConfirmDialogOpen(false); setSelectedRequest(null); }
        };
        React.useEffect(() => { fetchVerifySetting(); fetchRequests(); }, []);
        return (
            <Box sx={{ flex:1, display:'flex', flexDirection:'column', bgcolor:'background.default', overflow:'auto' }}>
                <Box sx={{ borderBottom:1, borderColor:'divider', bgcolor:'background.paper' }}>

                                <RadioGroup row value={verifyMode} onChange={(e)=>saveVerifySetting(e.target.value)}>
                                    <FormControlLabel value="allow_all" control={<Radio />} label="允许任何人添加" />
                                    <FormControlLabel value="need_verify" control={<Radio />} label="需要验证（发送申请）" />
                                    <FormControlLabel value="deny_all" control={<Radio />} label="拒绝所有人添加" />
                                </RadioGroup>
                            </FormControl>
                            {loadingVerify && <LinearProgress sx={{ mt:2 }} />}
                        </Paper>
                    )}
                    {tabValue === 1 && (
                        <Paper variant="outlined" sx={{ p:2, minHeight:200 }}>
                            <Typography variant="h6" gutterBottom>好友申请列表</Typography>
                            {loadingRequests && <CircularProgress size={24} sx={{ display:'block', mx:'auto', my:2 }} />}
                            {!loadingRequests && requests.length===0 && <Typography variant="body2" color="text.secondary" align="center" sx={{ py:2 }}>暂无好友申请</Typography>}
                            <List>

                                        <ListItemText primary={req.from_username} secondary={req.message || '申请添加您为好友'} />

    // ==================== FileMessageCard 组件 ====================
    function FileMessageCard({ fileId, isMine, onSnackbar }) {
        const [meta, setMeta] = React.useState(null);
        const [loading, setLoading] = React.useState(false);
        const [error, setError] = React.useState(false);
        const [downloading, setDownloading] = React.useState(false);
        const token = getAuth().token;


        React.useEffect(() => {
            if (!fileId) return;
            setLoading(true);
            apiRequest('get_file_info', { token, method: 'POST', body: { file_id: fileId } })
                .then(res => {
                    setMeta(res.data);
                    setLoading(false);
                })
                .catch(err => {
                    console.error('获取文件信息失败', err);
                    setError(true);
                    setLoading(false);
                });
        }, [fileId, token]);

        const handleDownload = async () => {
            if (!meta || !meta.allow_download) {
                if (onSnackbar) onSnackbar('文件不允许下载', 'warning');
                return;
            }
            setDownloading(true);
            try {
                const res = await apiRequest('generate_download_url', { token, method: 'POST', body: { file_id: fileId } });
                const url = res.data.url;
                window.open(url, '_blank');
            } catch (err) {
                if (onSnackbar) onSnackbar('获取下载链接失败: ' + err.message, 'error');
            } finally {
                setDownloading(false);
            }
        };

        if (loading) {
            return (
                <div className="file-card" style={{ cursor: 'default' }}>
                    <Icon>insert_drive_file</Icon>
                    <div className="file-info">
                        <div className="file-name">加载中...</div>
                    </div>
                    <CircularProgress size={20} />
                </div>
            );
        }
        if (error || !meta) {
            return (
                <div className="file-card" style={{ cursor: 'default' }}>
                    <Icon>error</Icon>
                    <div className="file-info">
                        <div className="file-name">文件信息获取失败</div>
                    </div>
                </div>
            );
        }

        const fileName = meta.original_name || '未知文件';
        const fileSize = formatFileSize(meta.size || 0);
        const allowDownload = meta.allow_download === true;

const displayName = fileName.length > 18 ? fileName.slice(0, 18) + '...' : fileName;

return (
    <div className="file-card" onClick={allowDownload ? handleDownload : undefined} style={{ cursor: allowDownload ? 'pointer' : 'default' }}>
        <Icon>insert_drive_file</Icon>
        <div className="file-info">
            <div className="file-name" title={fileName}>{displayName}</div>
            <div className="file-size">{fileSize}</div>
        </div>
        <div className="file-download-icon">
            {allowDownload ? <Icon style={{ color: '#4caf50' }}>check_circle</Icon> : <Icon style={{ color: '#f44336' }}>cancel</Icon>}
        </div>
    </div>
);}

// 下载页面
function DownloadPanel({ token, onSnackbar }) {
    const [fileId, setFileId] = React.useState('');
    const [loading, setLoading] = React.useState(false);
    const [fileInfo, setFileInfo] = React.useState(null);
    const [downloadCount, setDownloadCount] = React.useState(0);

    const handleGetInfo = async () => {
        if (!fileId.trim()) {
            onSnackbar('请输入文件ID', 'warning');
            return;
        }
        setLoading(true);
        try {
            const res = await apiRequest('get_file_info', { token, method: 'POST', body: { file_id: fileId } });
            setFileInfo(res.data);
            setDownloadCount(res.data.download_count || 0);
            onSnackbar('文件信息获取成功', 'success');
        } catch (err) {
            onSnackbar('获取失败: ' + err.message, 'error');
            setFileInfo(null);
        } finally {
            setLoading(false);
        }
    };

    const handleDownload = async () => {
        if (!fileInfo || !fileInfo.allow_download) {
            onSnackbar('文件不允许下载', 'warning');
            return;
        }
        setLoading(true);
        try {
            const res = await apiRequest('generate_download_url', { token, method: 'POST', body: { file_id: fileId } });
            window.open(res.data.url, '_blank');
            setDownloadCount(prev => prev + 1);
            onSnackbar('下载链接已打开', 'success');
        } catch (err) {
            onSnackbar('获取下载链接失败: ' + err.message, 'error');
        } finally {
            setLoading(false);
        }
    };

    return (
        <Box sx={{ p: 3, maxWidth: 600, mx: 'auto' }}>
            <Typography variant="h6" gutterBottom>通过文件ID下载</Typography>
            <TextField
                fullWidth
                label="文件ID"
                variant="outlined"
                value={fileId}
                onChange={(e) => setFileId(e.target.value.toUpperCase())}
                placeholder="例如: 3L0BT6QHKFGQ2RE0"
                sx={{ mb: 2 }}
            />
            <Button variant="contained" onClick={handleGetInfo} disabled={loading} sx={{ mr: 2 }}>
                查询信息
            </Button>
            {fileInfo && (
                <Paper variant="outlined" sx={{ mt: 3, p: 2 }}>
                    <Typography variant="body1"><strong>文件名：</strong>{fileInfo.original_name}</Typography>
                    <Typography variant="body1"><strong>大小：</strong>{formatFileSize(fileInfo.size)}</Typography>
                    <Typography variant="body1"><strong>允许下载：</strong>{fileInfo.allow_download ? '是' : '否'}</Typography>
                    <Typography variant="body1"><strong>下载次数：</strong>{downloadCount}</Typography>
                    <Button
                        variant="contained"
                        color="primary"
                        onClick={handleDownload}
                        disabled={!fileInfo.allow_download || loading}
                        sx={{ mt: 2 }}
                    >
                        获取下载链接
                    </Button>
                </Paper>
            )}
        </Box>
    );
}

// 管理页面（列表式）
function ManagePanel({ token, stationId, onSnackbar }) {
    const [files, setFiles] = React.useState([]);
    const [loading, setLoading] = React.useState(false);
    const [togglingId, setTogglingId] = React.useState(null);
    const [downloadingId, setDownloadingId] = React.useState(null);

    const fetchFileList = React.useCallback(async () => {
        setLoading(true);
        try {
            const res = await apiRequest('get_user_files', { token, method: 'GET' });
            const fileIds = res.data.files || [];
            const fileDetails = await Promise.all(
                fileIds.map(async (id) => {
                    try {
                        const info = await apiRequest('get_file_info', { token, method: 'POST', body: { file_id: id } });
                        return { id, ...info.data };
                    } catch {
                        return { id, error: true };
                    }
                })
            );
            setFiles(fileDetails.filter(f => !f.error));
        } catch (err) {
            onSnackbar('加载文件列表失败: ' + err.message, 'error');
        } finally {
            setLoading(false);
        }
    }, [token, onSnackbar]);

    React.useEffect(() => {
        fetchFileList();
        const interval = setInterval(fetchFileList, 30000);
        return () => clearInterval(interval);
    }, [fetchFileList]);

    const toggleAllowDownload = async (fileId, currentStatus) => {
        setTogglingId(fileId);
        try {
            await apiRequest('set_file_downloadable', { token, method: 'POST', body: { file_id: fileId, allow_download: !currentStatus } });
            setFiles(prev => prev.map(f => f.id === fileId ? { ...f, allow_download: !currentStatus } : f));
            onSnackbar(`已${!currentStatus ? '允许' : '禁止'}下载`, 'success');
        } catch (err) {
            onSnackbar('操作失败: ' + err.message, 'error');
        } finally {
            setTogglingId(null);
        }
    };

    const copyFileId = (id) => {
        navigator.clipboard.writeText(id);
        onSnackbar('文件ID已复制', 'success');
    };

    const copyFileMessage = (fileId) => {
        const msg = `[/pan{"stationID":"${stationId}","code":"${fileId}"}]`;
        navigator.clipboard.writeText(msg);
        onSnackbar('文件消息格式已复制，可直接发送', 'success');
    };

    const handleDownload = async (fileId) => {
        setDownloadingId(fileId);
        try {
            const res = await apiRequest('generate_download_url', { token, method: 'POST', body: { file_id: fileId } });
            window.open(res.data.url, '_blank');
            // 下载成功后刷新列表以更新下载次数
            await fetchFileList();
            onSnackbar('下载链接已打开', 'success');
        } catch (err) {
            onSnackbar('获取下载链接失败: ' + err.message, 'error');
        } finally {
            setDownloadingId(null);
        }
    };

    if (loading && files.length === 0) {
        return <Box sx={{ display: 'flex', justifyContent: 'center', p: 4 }}><CircularProgress /></Box>;
    }

    return (
        <Box sx={{ p: 2 }}>
            <Typography variant="h6" gutterBottom>我的文件</Typography>
            {files.length === 0 ? (
                <Typography color="text.secondary">暂无上传的文件</Typography>
            ) : (
                <TableContainer component={Paper}>
                    <Table size="small">
                        <TableHead>
                            <TableRow>
                                <TableCell>文件名</TableCell>
                                <TableCell>大小</TableCell>
                                <TableCell>下载次数</TableCell>
                                <TableCell>允许下载</TableCell>
                                <TableCell>操作</TableCell>
                                <TableCell>下载</TableCell>
                            </TableRow>
                        </TableHead>
                        <TableBody>
                            {files.map(file => (
                                <TableRow key={file.id}>
                                    <TableCell sx={{ maxWidth: 200 }}>
                                        <Tooltip title={file.original_name}>
                                            <Typography noWrap>{file.original_name.length > 18 ? file.original_name.slice(0,18)+'...' : file.original_name}</Typography>
                                        </Tooltip>
                                    </TableCell>
                                    <TableCell>{formatFileSize(file.size)}</TableCell>
                                    <TableCell>{file.download_count || 0}</TableCell>
                                    <TableCell>
                                        <Switch
                                            checked={file.allow_download === true}
                                            onChange={() => toggleAllowDownload(file.id, file.allow_download)}
                                            disabled={togglingId === file.id}
                                        />
                                    </TableCell>
                                    <TableCell>
                                        <Button size="small" onClick={() => copyFileId(file.id)} startIcon={<Icon>content_copy</Icon>}>ID</Button>
                                        <Button size="small" onClick={() => copyFileMessage(file.id)} startIcon={<Icon>chat</Icon>}>复制到聊天</Button>
                                    </TableCell>
                                    <TableCell>
                                        <Button
                                            size="small"
                                            variant="outlined"
                                            onClick={() => handleDownload(file.id)}
                                            disabled={downloadingId === file.id}
                                            startIcon={<Icon>download</Icon>}
                                        >
                                            下载
                                        </Button>
                                    </TableCell>
                                </TableRow>
                            ))}
                        </TableBody>
                    </Table>
                </TableContainer>
            )}
        </Box>
    );
}

                messagesRef.current = next;
                return next;
            });
        }, []);

        const stopRefreshTimer = () => {
            if (refreshTimerRef.current) {
                clearTimeout(refreshTimerRef.current);
                refreshTimerRef.current = null;
            }
        };

        const executeRefreshWithRetry = async () => {
            console.log(`执行Token刷新尝试，当前重试次数: ${retryCountRef.current}`);
            const success = await attemptTokenRefresh();
            if (success) {
                retryCountRef.current = 0;
                console.log("刷新成功，重置重试计数器，安排下一次刷新");
                scheduleNextRefresh(REFRESH_DELAY_MS);
            } else {
                retryCountRef.current += 1;
                console.log(`刷新失败，当前重试次数 ${retryCountRef.current}/${MAX_RETRIES}`);
                if (retryCountRef.current <= MAX_RETRIES) {
                    scheduleNextRefresh(RETRY_INTERVAL_MS);
                } else {
                    console.warn("Token刷新连续失败超过5次，强制退出登录");
                    stopRefreshTimer();
                    clearAuth();
                    if (typeof window.__onAuthFailure === 'function') {
                        window.__onAuthFailure();
                    } else {
                        onLogout();
                    }
                    setSnackbar({ open: true, message: '登录已过期，请重新登录', severity: 'error' });
                }
            }
        };

        const scheduleNextRefresh = (delayMs) => {
            stopRefreshTimer();
            refreshTimerRef.current = setTimeout(() => {
                refreshTimerRef.current = null;
                executeRefreshWithRetry();
            }, delayMs);
        };

        const resetRefreshCycle = () => {
            console.log("重置刷新周期，清除现有定时器，重新开始计时");
            stopRefreshTimer();
            retryCountRef.current = 0;
            scheduleNextRefresh(REFRESH_DELAY_MS);
        };

        React.useEffect(() => {
            const handleTokenRefreshed = () => {
                console.log("收到token刷新成功事件，重置刷新计时器");
                resetRefreshCycle();
            };
            window.addEventListener('eos-token-refreshed', handleTokenRefreshed);
            return () => {
                window.removeEventListener('eos-token-refreshed', handleTokenRefreshed);
            };
        }, []);

        React.useEffect(() => {
            if (uid && token) {
                resetRefreshCycle();
            }
            return () => {
                stopRefreshTimer();
            };
        }, [uid, token]);

        const handleLogout = () => {
            stopRefreshTimer();
            clearAuth();
            onLogout();
        };

        React.useEffect(() => {
            window.__onAuthFailure = () => {
                stopRefreshTimer();
                clearAuth();
                onLogout();
            };
            return () => { delete window.__onAuthFailure; };
        }, [onLogout]);

        const handleScroll = React.useCallback(() => {
            if (!chatContainerRef.current) return;
            const { scrollTop, scrollHeight, clientHeight } = chatContainerRef.current;
            const isNearBottom = scrollHeight - scrollTop - clientHeight < 50;
            setShouldAutoScroll(isNearBottom);
            if (scrollTop <= 30 && hasMore && !loadingMore && selectedFriend) {
                loadMoreMessages();
            }
        }, [hasMore, loadingMore, selectedFriend]);

        const scrollToBottom = React.useCallback(() => {
            if (chatContainerRef.current && shouldAutoScroll) {
                chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
            }
        }, [shouldAutoScroll]);

        const loadMoreMessages = async () => {
            if (loadingMore || !hasMore || !selectedFriend || currentPage <= 1) return;
            setLoadingMore(true);
            const prevScrollHeight = chatContainerRef.current?.scrollHeight || 0;
            const prevScrollTop = chatContainerRef.current?.scrollTop || 0;
            const nextPage = currentPage - 1;
            try {
                const data = await apiRequest('get_messages', {
                    token, method: 'GET',
                    query: { friend_uid: selectedFriend.uid, page: nextPage, limit: 20 }
                });
                const olderMessages = data.data.messages || [];
                if (olderMessages.length > 0) {
                    setMessages(prev => [...olderMessages, ...prev]);
                    setCurrentPage(nextPage);
                    setHasMore(nextPage > 1);
                    requestAnimationFrame(() => {
                        if (chatContainerRef.current) {
                            const newScrollHeight = chatContainerRef.current.scrollHeight;
                            chatContainerRef.current.scrollTop = newScrollHeight - prevScrollHeight + prevScrollTop;
                        }
                    });
                } else {
                    setHasMore(false);
                }
            } catch(err) {
                setSnackbar({ open: true, message: `加载历史消息失败: ${err.message}`, severity: 'error' });
            } finally {
                setLoadingMore(false);
            }
        };

const pollNewMessages = React.useCallback(async () => {
    if (!selectedFriend || latestMsgTime === 0) return;
    try {
        const data = await apiRequest('get_messages', {
            token, method: 'GET',
            query: { friend_uid: selectedFriend.uid, since: latestMsgTime }
        });
        const newMsgs = data.data;
        if (newMsgs && newMsgs.length > 0) {
            setMessages(prev => {
                // 构建已存在消息的唯一标识（from + time + content）
                const existingKeys = new Set();
                for (const msg of prev) {
                    const key = `${msg.from}|${msg.time}|${msg.content}`;
                    existingKeys.add(key);
                }
                // 过滤新消息中真正未出现过的
                const uniqueNew = [];
                let newestTime = latestMsgTime;
                for (const msg of newMsgs) {
                    const key = `${msg.from}|${msg.time}|${msg.content}`;
                    if (!existingKeys.has(key)) {
                        uniqueNew.push(msg);
                        if (msg.time > newestTime) newestTime = msg.time;
                    }
                }
                if (uniqueNew.length === 0) return prev;
                const merged = [...prev, ...uniqueNew];
                merged.sort((a, b) => a.time - b.time);
                if (newestTime > latestMsgTime) setLatestMsgTime(newestTime);
                return merged;
            });
            scrollToBottom();
        }
    } catch (err) {
        console.error("轮询新消息失败", err);
    }
}, [selectedFriend, latestMsgTime, token, scrollToBottom]);

const initMessages = async (friendUid) => {
    if (!friendUid) return;
    setLoadingMessages(true);
    setMessages([]);
    setHasMore(false);
    setCurrentPage(1);
    setTotalPages(0);
    const now = Math.floor(Date.now() / 1000);
    setLatestMsgTime(now);
    messagesRef.current = [];

    try {
        // 先获取第一页以得到总页数
        const firstPageData = await apiRequest('get_messages', {
            token, method: 'GET',
            query: { friend_uid: friendUid, page: 1, limit: 20 }
        });
        const totalPagesFromServer = firstPageData.data.total_pages || 0;
        setTotalPages(totalPagesFromServer);

        if (totalPagesFromServer === 0) {
            setMessages([]);
            setHasMore(false);
            setCurrentPage(0);
            return;
        }

        let loadedMsgs = [];
        let newCurrentPage = totalPagesFromServer;
        let newHasMore = false;

        if (totalPagesFromServer === 1) {
            // 只有一页，直接使用
            loadedMsgs = firstPageData.data.messages || [];
            newCurrentPage = 1;
            newHasMore = false;
        } else {
            // 总页数 >= 2，加载最后两页（最新的 40 条）
            const lastPage = totalPagesFromServer;
            const secondLastPage = lastPage - 1;

            // 请求最后一页
            const lastPageData = await apiRequest('get_messages', {
                token, method: 'GET',
                query: { friend_uid: friendUid, page: lastPage, limit: 20 }
            });
            const lastPageMsgs = lastPageData.data.messages || [];

            // 请求倒数第二页
            const secondLastPageData = await apiRequest('get_messages', {
                token, method: 'GET',
                query: { friend_uid: friendUid, page: secondLastPage, limit: 20 }
            });
            const secondLastPageMsgs = secondLastPageData.data.messages || [];

            // 合并两页消息并按时间排序（旧→新，显示时最新的在底部）
            loadedMsgs = [...secondLastPageMsgs, ...lastPageMsgs];
            loadedMsgs.sort((a, b) => a.time - b.time);

            // 当前已加载到倒数第二页
            newCurrentPage = secondLastPage;
            // 如果还有更早的页（总页数 > 2），则还有更多消息
            newHasMore = (totalPagesFromServer > 2);
        }

        setMessages(loadedMsgs);
        setCurrentPage(newCurrentPage);
        setHasMore(newHasMore);

        if (loadedMsgs.length > 0) {
            // 最新消息时间是最后一条消息的时间
            setLatestMsgTime(loadedMsgs[loadedMsgs.length - 1].time);
        }

        setTimeout(() => {
            if (chatContainerRef.current) {
                chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
            }
            setShouldAutoScroll(true);
        }, 100);
    } catch (err) {
        setSnackbar({ open: true, message: `加载消息失败: ${err.message}`, severity: 'error' });
    } finally {
        setLoadingMessages(false);
    }
};

        const sendMessage = async () => {

        return (

{uploadManagerTab === 1 && (

                                        </Box>
                                        {loadingMessages && <LinearProgress sx={{ position:'absolute', top:0, left:0, right:0, zIndex:1 }} />}
                                        <Box className="chat-messages" ref={chatContainerRef} onScroll={handleScroll}>
                                            {loadingMore && <div className="loading-more-indicator">加载更早消息...</div>}
                                            {messages.length===0 ? <Typography variant="body2" sx={{ textAlign:'center', color:'text.secondary', mt:4 }}>暂无消息，发送一条吧~</Typography> : messages.map((msg, idx) => {
                                                const isMine = msg.from === uid;
                                                const fileInfo = parseFileMessage(msg.content);
                                                return (
                                                    <Box
                                                        key={`${msg.from}_${msg.time}_${idx}`}
                                                        sx={{
                                                            display: 'flex',
                                                            justifyContent: isMine ? 'flex-end' : 'flex-start',
                                                            alignItems: 'flex-start',
                                                            mb: 1,
                                                            gap: 1
                                                        }}
                                                    >
                                                        {!isMine && (
                                                            <Avatar
                                                                src={getAvatarUrl(msg.from)}
                                                                sx={{ width: 32, height: 32 }}
                                                                onError={(e) => { e.target.onerror = null; e.target.src = ''; }}
                                                            >
                                                                <Icon>person</Icon>
                                                            </Avatar>
                                                        )}
                                                        <div className={`message-bubble ${isMine ? 'message-mine' : 'message-other'}`}>
                                                            {fileInfo ? (
                                                                <FileMessageCard fileId={fileInfo.fileId} isMine={isMine} onSnackbar={showSnackbar} />
                                                            ) : (
                                                                <Typography variant="body2">{msg.content}</Typography>
                                                            )}
                                                        </div>
                                                        {isMine && (
                                                            <Avatar
                                                                src={getAvatarUrl(uid)}
                                                                sx={{ width: 32, height: 32 }}
                                                                onError={(e) => { e.target.onerror = null; e.target.src = ''; }}
                                                            >
                                                                <Icon>person</Icon>
                                                            </Avatar>
                                                        )}
                                                    </Box>
                                                );
                                            })}
                                        </Box>
                                        <Box sx={{ p:2, bgcolor:'background.paper', borderTop:'1px solid', borderColor:'divider', display:'flex' }}>
                                            <TextField fullWidth variant="outlined" placeholder="输入消息..." value={inputMsg} onChange={e=>setInputMsg(e.target.value)} onKeyPress={e=>e.key==='Enter'&&sendMessage()} disabled={sending} size="small" />
                                            <IconButton color="primary" onClick={sendMessage} disabled={sending||!inputMsg.trim()}><Icon>send</Icon></IconButton>
                                        </Box>
                                    </>
                                ) : <Box sx={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100%' }}><Typography variant="h6" color="text.secondary">选择一个好友开始聊天</Typography></Box>}
                            </Box>
                        </>
                    )}
                </Box>
                <Dialog open={addFriendOpen} onClose={()=>{ setAddFriendOpen(false); setNewFriendName(''); setSearchResult(null); }}>
                    <DialogTitle>添加好友</DialogTitle>
                    <DialogContent>
                        <TextField autoFocus margin="dense" label="对方UID或用户名" helperText="请输入32位UID（大写字母数字组合）或用户名" fullWidth variant="outlined" value={newFriendName} onChange={e=>setNewFriendName(e.target.value)} disabled={addingFriend} />
                        {searching && <CircularProgress size={24} sx={{ mt:1 }} />}
                        {searchResult && !searching && <Box className="search-result" onClick={()=>{ setPendingFriend({ uid: searchResult.uid, username: searchResult.username }); setConfirmAddOpen(true); }}><Avatar src={getAvatarUrl(searchResult.uid)} sx={{ mr:2 }}><Icon>person</Icon></Avatar><Box><Typography variant="body1">{searchResult.username}</Typography><Typography variant="caption" color="text.secondary">{searchResult.uid}</Typography></Box></Box>}
                    </DialogContent>
                    <DialogActions><Button onClick={()=>{ setAddFriendOpen(false); setNewFriendName(''); setSearchResult(null); }}>取消</Button></DialogActions>
                </Dialog>
                <Dialog open={confirmAddOpen} onClose={()=>setConfirmAddOpen(false)}><DialogTitle>添加好友</DialogTitle><DialogContent><Typography>确定要添加 <strong>{pendingFriend?.username}</strong> 为好友吗？</Typography></DialogContent><DialogActions><Button onClick={()=>setConfirmAddOpen(false)}>取消</Button><Button onClick={handleConfirmAdd} color="primary" disabled={addingFriend}>{addingFriend?<CircularProgress size={24}/>:'确定'}</Button></DialogActions></Dialog>
                <Dialog open={avatarUploadOpen} onClose={()=>setAvatarUploadOpen(false)}><DialogTitle>上传头像</DialogTitle><DialogContent><input type="file" accept="image/jpeg,image/png,image/gif" onChange={e=>setAvatarFile(e.target.files[0])} style={{ marginTop:8 }} /></DialogContent><DialogActions><Button onClick={()=>setAvatarUploadOpen(false)}>取消</Button><Button onClick={handleAvatarUpload} disabled={!avatarFile||uploadingAvatar}>{uploadingAvatar?<CircularProgress size={24}/>:'上传'}</Button></DialogActions></Dialog>
                <Dialog open={settingsOpen} onClose={()=>setSettingsOpen(false)}><DialogTitle>设置</DialogTitle><DialogContent><TextField fullWidth label="站点链接 (API 地址)" variant="outlined" margin="dense" placeholder="例如: http://example.com/index.php" value={tempApiBase} onChange={e=>setTempApiBase(e.target.value)} /><Typography variant="body2" color="text.secondary" sx={{ mt:1, mb:2 }}>修改后将清除当前登录状态，需要重新登录。</Typography><FormControlLabel control={<Switch checked={darkMode} onChange={e=>setDarkMode(e.target.checked)} color="primary" />} label="暗色模式" sx={{ mb:2 }} /><Button fullWidth variant="outlined" color="error" onClick={handleLogout} sx={{ mt:1 }}>退出登录</Button></DialogContent><DialogActions><Button onClick={()=>setSettingsOpen(false)}>取消</Button><Button onClick={handleUpdateApiBase} color="primary">保存站点链接</Button></DialogActions></Dialog>
                <Snackbar open={snackbar.open} autoHideDuration={4000} onClose={()=>setSnackbar({...snackbar, open:false})} anchorOrigin={{ vertical:'bottom', horizontal:'center' }}><Alert severity={snackbar.severity} onClose={()=>setSnackbar({...snackbar, open:false})}>{snackbar.message}</Alert></Snackbar>
            </Box>
        );
    }

    // ==================== App ====================
    function App() {
        const [isLoggedIn, setIsLoggedIn] = React.useState(false);
        const [loading, setLoading] = React.useState(true);
        const [darkMode, setDarkMode] = React.useState(getDarkModePreference());
        const theme = React.useMemo(() => createTheme({ palette: { mode: darkMode ? 'dark' : 'light', primary: { main: '#1976d2' }, secondary: { main: '#dc004e' } } }), [darkMode]);
        React.useEffect(() => { setDarkModePreference(darkMode); }, [darkMode]);
        React.useEffect(() => {
            const apiBase = getApiBase();
            const { uid, token } = getAuth();
            if (apiBase && uid && token) {
                apiRequest('get_friends', { token, method: 'GET', skipAuthRefresh: true }).then(() => setIsLoggedIn(true)).catch(() => { clearAuth(); setIsLoggedIn(false); }).finally(() => setLoading(false));
            } else setLoading(false);
        }, []);
        if (loading) return <Box sx={{ display:'flex', justifyContent:'center', alignItems:'center', height:'100vh' }}><CircularProgress /></Box>;
        return (
            <ThemeProvider theme={theme}>
                <CssBaseline />
                {isLoggedIn ? <MainApp onLogout={()=>setIsLoggedIn(false)} darkMode={darkMode} setDarkMode={setDarkMode} /> : <AuthView onLogin={()=>setIsLoggedIn(true)} />}
            </ThemeProvider>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
